name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Node dependencies
        run: npm ci

      - name: Check frontend formatting
        run: npm run format:check

      - name: Check Svelte and TypeScript
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: npm run format:check:rust

      - name: Check Rust
        run: npm run check:rust
